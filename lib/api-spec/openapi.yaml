openapi: 3.1.0
info:
  title: High6 Suite API
  version: 0.1.0
  description: |
    Internal HTTP API for the High6 Suite. All responses use the standard
    envelope: `{ success: true, data }` on success and
    `{ success: false, error?, errors? }` on failure.
servers:
  - url: /api
    description: Same-origin proxy (Vite dev / production)
security:
  - cookieAuth: []
tags:
  - name: auth
  - name: account
  - name: users
  - name: posts
  - name: departments
  - name: settings
  - name: uploads
  - name: categories

paths:
  /auth/login:
    post:
      tags: [auth]
      summary: Sign in with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginInput" }
      responses:
        "200":
          description: Authenticated; sets `h6_session` cookie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /auth/logout:
    post:
      tags: [auth]
      summary: Clear the current session cookie
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmptyEnvelope" }
  /auth/me:
    get:
      tags: [auth]
      summary: Return the current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /account:
    get:
      tags: [account]
      summary: Get the current user's account
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /account/profile:
    patch:
      tags: [account]
      summary: Update the current user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /account/security:
    get:
      tags: [account]
      summary: Read security settings for the current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SecurityEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /account/password:
    patch:
      tags: [account]
      summary: Change the current user's password
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChangePasswordInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmptyEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /users:
    get:
      tags: [users]
      summary: List users
      parameters:
        - { name: q, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: perPage, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
        - { name: sort, in: query, schema: { type: string } }
        - { name: dir, in: query, schema: { type: string, enum: [asc, desc] } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UsersPageEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateUserInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /users/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [users]
      summary: Get a user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [users]
      summary: Update a user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [users]
      summary: Delete a user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmptyEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /departments:
    get:
      tags: [departments]
      summary: List departments
      parameters:
        - { name: q, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: perPage, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
        - { name: isActive, in: query, schema: { type: boolean } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DepartmentsPageEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [departments]
      summary: Create a department
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DepartmentInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DepartmentEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /departments/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [departments]
      summary: Get a department
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DepartmentEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [departments]
      summary: Update a department
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DepartmentInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DepartmentEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [departments]
      summary: Archive a department
      description: Soft-disables a department by setting `isActive` to false.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DepartmentEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /categories:
    get:
      tags: [categories]
      summary: List categories
      parameters:
        - { name: q, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: perPage, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CategoriesPageEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CategoryInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CategoryEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /categories/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [categories]
      summary: Get a category
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CategoryEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [categories]
      summary: Update a category
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CategoryInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CategoryEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [categories]
      summary: Delete a category
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CategoryEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /posts:
    get:
      tags: [posts]
      summary: List posts
      parameters:
        - { name: q, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: perPage, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
        - { name: sort, in: query, schema: { type: string } }
        - { name: dir, in: query, schema: { type: string, enum: [asc, desc] } }
        - { name: userId, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string, enum: [published, draft] } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PostsPageEnvelope" }
    post:
      tags: [posts]
      summary: Create a post
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PostEnvelope" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /posts/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [posts]
      summary: Get a post
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PostEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [posts]
      summary: Update a post
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PostEnvelope" }
    delete:
      tags: [posts]
      summary: Delete a post
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmptyEnvelope" }

  /settings/general:
    get:
      tags: [settings]
      summary: Read general app settings
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SettingsEnvelope" }
    patch:
      tags: [settings]
      summary: Update general app settings
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SettingsInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SettingsEnvelope" }
  /settings/appearance:
    get:
      tags: [settings]
      summary: Read appearance settings
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SettingsEnvelope" }
    patch:
      tags: [settings]
      summary: Update appearance settings
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SettingsInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SettingsEnvelope" }
  /settings/notifications:
    get:
      tags: [settings]
      summary: Read notification settings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SettingsEnvelope" }
    patch:
      tags: [settings]
      summary: Update notification settings
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SettingsInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SettingsEnvelope" }
  /settings/help-center:
    get:
      tags: [settings]
      summary: Read help center settings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SettingsEnvelope" }
    patch:
      tags: [settings]
      summary: Update help center settings
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SettingsInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SettingsEnvelope" }

  /uploads/app-logo:
    post:
      tags: [uploads]
      summary: Upload app logo
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: "#/components/schemas/FileUploadInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UploadEnvelope" }
  /uploads/app-icon:
    post:
      tags: [uploads]
      summary: Upload app icon
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: "#/components/schemas/FileUploadInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UploadEnvelope" }
  /uploads/avatar:
    post:
      tags: [uploads]
      summary: Upload user avatar
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: "#/components/schemas/FileUploadInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UploadEnvelope" }
  /uploads/user-manual:
    post:
      tags: [uploads]
      summary: Upload user manual PDF
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: "#/components/schemas/FileUploadInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UploadEnvelope" }

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: h6_session
  responses:
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Failure" }
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Failure" }
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Failure" }
  schemas:
    Failure:
      type: object
      required: [success]
      properties:
        success: { type: boolean, enum: [false] }
        error: { type: string }
        errors:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
    EmptyEnvelope:
      type: object
      required: [success]
      properties:
        success: { type: boolean, enum: [true] }
        data:
          type: object
          additionalProperties: false
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 1 }
    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword: { type: string }
        newPassword: { type: string, minLength: 8 }
    SessionUser:
      type: object
      required: [id, email, firstName, lastName]
      properties:
        id: { type: string }
        email: { type: string, format: email }
        firstName: { type: string }
        middleName: { type: string, nullable: true }
        lastName: { type: string }
        avatar: { type: string, nullable: true }
        contactNumber: { type: string, nullable: true }
    AuthSessionEnvelope:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, enum: [true] }
        data:
          type: object
          required: [user]
          properties:
            user: { $ref: "#/components/schemas/SessionUser" }
    UserInput:
      type: object
      required: [firstName, lastName, email]
      properties:
        firstName: { type: string }
        middleName: { type: string }
        lastName: { type: string }
        email: { type: string, format: email }
        contactNumber: { type: string }
        avatar: { type: string }
    CreateUserInput:
      allOf:
        - $ref: "#/components/schemas/UserInput"
        - type: object
          required: [password]
          properties:
            password: { type: string, minLength: 8 }
    UserEnvelope:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, enum: [true] }
        data: { $ref: "#/components/schemas/SessionUser" }
    PaginationLinks:
      type: object
      required: [first, last, prev, next]
      properties:
        first: { type: string, nullable: true }
        last: { type: string, nullable: true }
        prev: { type: string, nullable: true }
        next: { type: string, nullable: true }
    PaginationMeta:
      type: object
      required: [current_page, last_page, per_page, path, total, from, to]
      properties:
        current_page: { type: integer }
        last_page: { type: integer }
        per_page: { type: integer }
        path: { type: string }
        total: { type: integer }
        from: { type: integer, nullable: true }
        to: { type: integer, nullable: true }
    UsersPageEnvelope:
      type: object
      required: [success, data, links, meta]
      properties:
        success: { type: boolean, enum: [true] }
        data:
          type: array
          items: { $ref: "#/components/schemas/SessionUser" }
        links: { $ref: "#/components/schemas/PaginationLinks" }
        meta: { $ref: "#/components/schemas/PaginationMeta" }
    PostInput:
      type: object
      required: [title, body, status, userId]
      properties:
        title: { type: string, minLength: 1 }
        body: { type: string, minLength: 1 }
        status: { type: string, enum: [published, draft] }
        userId: { type: string, minLength: 1 }
    Post:
      type: object
      required: [id, title, body, status, userId]
      properties:
        id: { type: string }
        title: { type: string }
        body: { type: string }
        status: { type: string, enum: [published, draft] }
        userId: { type: string }
    PostEnvelope:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, enum: [true] }
        data: { $ref: "#/components/schemas/Post" }
    PostsPageEnvelope:
      type: object
      required: [success, data, links, meta]
      properties:
        success: { type: boolean, enum: [true] }
        data:
          type: array
          items: { $ref: "#/components/schemas/Post" }
        links: { $ref: "#/components/schemas/PaginationLinks" }
        meta: { $ref: "#/components/schemas/PaginationMeta" }
    DepartmentInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string, nullable: true }
        isActive: { type: boolean, default: true }
    Department:
      type: object
      required: [id, name, isActive, createdAt, updatedAt]
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    DepartmentEnvelope:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, enum: [true] }
        data: { $ref: "#/components/schemas/Department" }
    DepartmentsPageEnvelope:
      type: object
      required: [success, data, links, meta]
      properties:
        success: { type: boolean, enum: [true] }
        data:
          type: array
          items: { $ref: "#/components/schemas/Department" }
        links: { $ref: "#/components/schemas/PaginationLinks" }
        meta: { $ref: "#/components/schemas/PaginationMeta" }
    CategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
    Category:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CategoryEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/Category"
    CategoriesPageEnvelope:
      type: object
      required: [success, data, links, meta]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        links:
          $ref: "#/components/schemas/PaginationLinks"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
    SecurityEnvelope:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, enum: [true] }
        data:
          type: object
          required: [passwordUpdatedAt]
          properties:
            passwordUpdatedAt: { type: string, nullable: true }
    SettingsInput:
      type: object
      additionalProperties: true
    SettingsEnvelope:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, enum: [true] }
        data:
          type: object
          additionalProperties: true
    FileUploadInput:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary
    UploadEnvelope:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, enum: [true] }
        data:
          type: object
          required: [path]
          properties:
            path: { type: string }